<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Survey Perokok</title>
    <link rel="stylesheet" href="style.css">
    <style>
.btn-submit {
    background-color: #673ab7;
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 4px;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}
.btn-reset {
    background: none;
    border: none;
    color: #673ab7;
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    padding: 10px 8px;
}
.navigation-link {
    margin-top: 24px;
    text-align: center;
}
.navigation-link a {
    color: #673ab7;
    text-decoration: none;
    font-size: 14px;
}
    </style>
</head>
<body>
    <form class="form-container">
        
        <div class="form-header">
            <div class="form-title">Form Survey Perokok</div>
            <div class="form-description">Silakan isi data berikut dengan sebenar-benarnya.</div>
        </div>

        <div class="card">
            <div class="question-text">Siapa nama anda?</div>
            <div class="input-container">
                <input type="text" name="nama-lengkap" id="nama" placeholder="Jawaban Anda" class="text-input">
            </div>
        </div>

        <div class="card">
            <div class="question-text">Berapa umur anda?</div>
            <div class="input-container">
                <input type="text" name="Umur" id="umur" placeholder="Jawaban Anda" class="text-input">
            </div>
        </div>

        <div class="card">
            <div class="question-text">Apa jenis kelamin anda?</div>
            <div class="radio-group">
                <div class="option-item">
                    <input type="radio" name="jenis_kelamin" id="choice1" value="Laki-laki">
                    <div class="option-text">Laki-laki</div>
                </div>
                <div class="option-item">
                    <input type="radio" name="jenis_kelamin" id="choice2" value="Perempuan">
                    <div class="option-text">Perempuan</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="question-text">Apakah anda perokok?</div>
            <div class="radio-group">
                <div class="option-item">
                    <input type="radio" name="perokok" id="choice3" value="Perokok">
                    <div class="option-text">Ya</div>
                </div>
                <div class="option-item">
                    <input type="radio" name="perokok" id="choice4" value="Bukan Perokok">
                    <div class="option-text">Tidak</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="question-text">Jika anda perokok, rokok apa yang anda pernah coba?</div>
            <div class="checkbox-group">
                <div class="option-item">
                    <input type="checkbox" id="used1" name="rokok" value="Gudang Garam Filter">
                    <div class="option-text">Gudang Garam Filter</div>
                </div>
                <div class="option-item">
                    <input type="checkbox" id="used2" name="rokok" value="Lucky Strike">
                    <div class="option-text">Lucky Strike</div>
                </div>
                <div class="option-item">
                    <input type="checkbox" id="used3" name="rokok" value="Marlboro">
                    <div class="option-text">Marlboro</div>
                </div>
                <div class="option-item">
                    <input type="checkbox" id="used4" name="rokok" value="Esse">
                    <div class="option-text">Esse</div>
                </div>
            </div>
        </div>

        <div class="action-container">
            <button type="submit" class="btn-submit">Kirim</button>
            <button type="reset" class="btn-reset">Kosongkan Formulir</button>
        </div>

    </form>

    <div class="navigation-link">
        <a href="pages/table.html">Table</a>
    </div>
    
    <script>
        const form = document.querySelector(".form-container");
        
        form.addEventListener("submit", (e) => {
            e.preventDefault();
            
            const data = new FormData(e.target);
            const newData = Object.fromEntries(data.entries());
            newData.rokok = data.getAll("rokok");
            const dataSaved = window.localStorage.getItem("sample");
            let dataArray = [];
            if (dataSaved) {
                dataArray = JSON.parse(dataSaved);
            }
            dataArray.push(newData);
            console.log("Data tersimpan:", dataArray);
            window.localStorage.setItem("sample", JSON.stringify(dataArray));

            alert("Data anda berhasil disimpan!");
            // form.reset();
        });
    </script>
</body>
</html>
