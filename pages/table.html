<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Syrvey</title>
    <link rel="stylesheet" href="/style.css">
    <style>
    </style>
</head>
<body class="table">
    <h2>Data Hasil Survey</h2>
    <table>
        <thead>
            <tr>
                <th>No.</th>
                <th>Nama</th>
                <th>Umur</th>
                <th>Jenis Kelamin</th>
                <th>Perokok</th>
                <th>Merk Rokok</th>
            </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
    </table>

    <div class="action-container">
        <a href="../index.html" class="btn-back">Kembali ke Form</a>
    </div>
    <script>
        const tableBody = document.getElementById("table-body");
        const dataSaved = window.localStorage.getItem("sample");

        if (dataSaved) {
            const dataArray = JSON.parse(dataSaved);

            dataArray.forEach((item, index) => {
                console.log(dataArray)
                const nama = item.nama_lengkap || "-";
                const umur = item.Umur || "-";
                const jk = item.jenis_kelamin || "-";
                const perokok = item.perokok || "-";
                const merk = Array.isArray(item.rokok) ? item.rokok.join(", ") : (item.rokok || "-");

                const tableSample = document.createElement("tr")
                const urut = document.createElement("td")
                const namaSample = document.createElement("td")
                const umurSample = document.createElement("td")
                const jkSample = document.createElement("td")
                const status = document.createElement("td")
                const merkRokok = document.createElement("td")
                urut.append(index + 1)
                namaSample.append(nama)
                umurSample.append(umur)
                jkSample.append(jk)
                status.append(perokok)
                merkRokok.append(merk)

                tableSample.append(urut, namaSample, umurSample, jkSample, status, merkRokok)
                tableBody.append(tableSample)
                });
        } else {
            const tableSample = document.createElement("tr")
            const urut = document.createElement("td")
            urut.append("Belum ada data survey tersimpan.")
            urut.setAttribute("class", "empty-state")
            urut.setAttribute("colspan", "6")
            tableSample.append(urut)
            tableBody.append(tableSample)
        }
    </script>
</body>
</html>
