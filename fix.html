<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Survey Perokok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="font-['Roboto',Arial,sans-serif] bg-[#f0ebf8] m-0 p-5 flex flex-col items-center">
    
    <form class="form-container w-full max-w-[640px] grid grid-cols-1 gap-3">
        
        <div class="bg-white rounded-lg border-t-[10px] border-[#673ab7] p-6 shadow-[0_1px_3px_rgba(0,0,0,0.12)]">
            <div class="text-[32px] font-normal mb-2 text-[#202124]">Form Survey Perokok</div>
            <div class="text-sm text-[#202124]">Silakan isi data berikut dengan sebenar-benarnya.</div>
        </div>

        <div class="bg-white rounded-lg p-6 shadow-[0_1px_3px_rgba(0,0,0,0.12)] flex flex-col gap-4">
            <div class="text-base text-[#202124] font-medium">Siapa nama anda?</div>
            <div class="w-full">
                <input type="text" name="nama_lengkap" id="nama" placeholder="Jawaban Anda" class="w-1/2 border-0 border-b border-[#dadce0] py-2 text-sm outline-none transition-all duration-200 focus:border-b-2 focus:border-[#673ab7] bg-transparent">
            </div>
        </div>

        <div class="bg-white rounded-lg p-6 shadow-[0_1px_3px_rgba(0,0,0,0.12)] flex flex-col gap-4">
            <div class="text-base text-[#202124] font-medium">Berapa umur anda?</div>
            <div class="w-full">
                <input type="text" name="Umur" id="umur" placeholder="Jawaban Anda" class="w-1/2 border-0 border-b border-[#dadce0] py-2 text-sm outline-none transition-all duration-200 focus:border-b-2 focus:border-[#673ab7] bg-transparent">
            </div>
        </div>

        <div class="bg-white rounded-lg p-6 shadow-[0_1px_3px_rgba(0,0,0,0.12)] flex flex-col gap-4">
            <div class="text-base text-[#202124] font-medium">Apa jenis kelamin anda?</div>
            <div class="flex flex-col gap-3">
                <label class="flex items-center gap-2.5 cursor-pointer">
                    <input type="radio" name="jenis_kelamin" id="choice1" value="Laki-laki" class="w-5 h-5 cursor-pointer accent-[#673ab7]">
                    <span class="text-sm text-[#202124]">Laki-laki</span>
                </label>
                <label class="flex items-center gap-2.5 cursor-pointer">
                    <input type="radio" name="jenis_kelamin" id="choice2" value="Perempuan" class="w-5 h-5 cursor-pointer accent-[#673ab7]">
                    <span class="text-sm text-[#202124]">Perempuan</span>
                </label>
            </div>
        </div>

        <div class="bg-white rounded-lg p-6 shadow-[0_1px_3px_rgba(0,0,0,0.12)] flex flex-col gap-4">
            <div class="text-base text-[#202124] font-medium">Apakah anda perokok?</div>
            <div class="flex flex-col gap-3">
                <label class="flex items-center gap-2.5 cursor-pointer">
                    <input type="radio" name="perokok" id="choice3" value="Perokok" class="w-5 h-5 cursor-pointer accent-[#673ab7]">
                    <span class="text-sm text-[#202124]">Ya</span>
                </label>
                <label class="flex items-center gap-2.5 cursor-pointer">
                    <input type="radio" name="perokok" id="choice4" value="Bukan Perokok" class="w-5 h-5 cursor-pointer accent-[#673ab7]">
                    <span class="text-sm text-[#202124]">Tidak</span>
                </label>
            </div>
        </div>

        <div class="bg-white rounded-lg p-6 shadow-[0_1px_3px_rgba(0,0,0,0.12)] flex flex-col gap-4">
            <div class="text-base text-[#202124] font-medium">Jika anda perokok, rokok apa yang anda pernah coba?</div>
            <div class="flex flex-col gap-3">
                <label class="flex items-center gap-2.5 cursor-pointer">
                    <input type="checkbox" id="used1" name="rokok" value="Gudang Garam Filter" class="w-5 h-5 cursor-pointer accent-[#673ab7]">
                    <span class="text-sm text-[#202124]">Gudang Garam Filter</span>
                </label>
                <label class="flex items-center gap-2.5 cursor-pointer">
                    <input type="checkbox" id="used2" name="rokok" value="Lucky Strike" class="w-5 h-5 cursor-pointer accent-[#673ab7]">
                    <span class="text-sm text-[#202124]">Lucky Strike</span>
                </label>
                <label class="flex items-center gap-2.5 cursor-pointer">
                    <input type="checkbox" id="used3" name="rokok" value="Marlboro" class="w-5 h-5 cursor-pointer accent-[#673ab7]">
                    <span class="text-sm text-[#202124]">Marlboro</span>
                </label>
                <label class="flex items-center gap-2.5 cursor-pointer">
                    <input type="checkbox" id="used4" name="rokok" value="Esse" class="w-5 h-5 cursor-pointer accent-[#673ab7]">
                    <span class="text-sm text-[#202124]">Esse</span>
                </label>
            </div>
        </div>

        <div class="flex flex-wrap justify-between items-center py-3 gap-3">
            <button type="submit" class="bg-[#673ab7] hover:bg-[#5e35b1] text-white border-none py-2.5 px-6 rounded font-medium text-sm cursor-pointer shadow-[0_1px_2px_rgba(0,0,0,0.05)] transition-colors">Kirim</button>
            <button type="reset" class="bg-[#673ab7] hover:bg-[#5e35b1] text-white border-none py-2.5 px-6 rounded font-medium text-sm cursor-pointer shadow-[0_1px_2px_rgba(0,0,0,0.05)] transition-colors">Kosongkan Formulir</button>
            <a id="navigation-link" href="pages/table.html" class="bg-[#673ab7] hover:bg-[#5e35b1] text-white text-center no-underline border-none py-2.5 px-6 rounded font-medium text-sm cursor-pointer shadow-[0_1px_2px_rgba(0,0,0,0.05)] transition-colors">Show Survey Results</a>
        </div>

    </form>

    <script>
        const form = document.querySelector(".form-container");
        
        form.addEventListener("submit", (e) => {
            e.preventDefault();
            
            const data = new FormData(e.target);
            const newData = Object.fromEntries(data.entries());
            newData.rokok = data.getAll("rokok");
            const dataSaved = window.localStorage.getItem("sample");
            let dataArray = [];
            if (dataSaved) {
                dataArray = JSON.parse(dataSaved);
            }
            dataArray.push(newData);
            console.log("Data tersimpan:", dataArray);
            window.localStorage.setItem("sample", JSON.stringify(dataArray));

            alert("Data anda berhasil disimpan!");
        });
    </script>
</body>
</html>
